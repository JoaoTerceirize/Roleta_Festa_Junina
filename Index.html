<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roleta de Prendas</title>
<style>
  :root{
    --azul-noite:#1d2a52;
    --azul-fundo:#243468;
    --amarelo:#ffc93c;
    --laranja:#ff8c42;
    --vermelho:#e8484f;
    --verde:#3fa66a;
    --roxo:#7a5fb5;
    --rosa:#e86fa4;
    --creme:#fff6e3;
    --marrom:#5a3825;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    background:radial-gradient(circle at 50% 20%, var(--azul-fundo) 0%, var(--azul-noite) 70%);
    color:var(--creme);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    padding-bottom:24px;
  }

  /* Bandeirinhas no topo */
  .bandeirinhas{
    width:100%;
    display:flex;
    justify-content:center;
    gap:2px;
    padding-top:0;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.35));
  }
  .bandeirinhas svg{width:100%;max-width:520px;height:44px;display:block;}

  header{text-align:center;padding:10px 16px 4px;}
  h1{
    font-size:clamp(1.6rem,7vw,2.4rem);
    letter-spacing:1px;
    color:var(--amarelo);
    text-shadow:2px 2px 0 var(--vermelho), 4px 4px 0 rgba(0,0,0,.35);
    text-transform:uppercase;
  }
  .sub{font-size:.9rem;opacity:.85;margin-top:4px;}

  /* Roleta */
  .palco{
    position:relative;
    width:min(88vw,420px);
    aspect-ratio:1/1;
    margin:18px 0 8px;
  }
  .ponteiro{
    position:absolute;
    top:-6px;left:50%;
    transform:translateX(-50%);
    z-index:5;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.5));
  }
  .roda-wrap{
    width:100%;height:100%;
    border-radius:50%;
    box-shadow:0 0 0 8px var(--marrom), 0 0 0 12px var(--amarelo), 0 14px 34px rgba(0,0,0,.55);
    overflow:hidden;
    background:var(--marrom);
  }
  #roda{
    width:100%;height:100%;
    transform:rotate(0deg);
    transition:transform 5.2s cubic-bezier(.12,.65,.08,1);
    display:block;
  }
  .cubo-central{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:19%;height:19%;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffe08a, var(--amarelo) 60%, #d99a12);
    border:4px solid var(--marrom);
    z-index:4;
    display:flex;align-items:center;justify-content:center;
    font-weight:bold;color:var(--marrom);
    font-size:clamp(.55rem,2.4vw,.8rem);
    text-align:center;line-height:1.1;
    box-shadow:0 3px 8px rgba(0,0,0,.4);
  }

  /* Botão */
  .btn-girar{
    margin-top:14px;
    font-family:inherit;
    font-size:clamp(1.2rem,5.5vw,1.5rem);
    font-weight:bold;
    text-transform:uppercase;
    letter-spacing:2px;
    color:var(--marrom);
    background:linear-gradient(180deg,#ffe08a,var(--amarelo) 55%,#e8a915);
    border:none;
    border-radius:60px;
    padding:16px 52px;
    cursor:pointer;
    box-shadow:0 6px 0 #a86f0a, 0 10px 18px rgba(0,0,0,.45);
    transition:transform .12s, box-shadow .12s;
    touch-action:manipulation;
  }
  .btn-girar:active{transform:translateY(4px);box-shadow:0 2px 0 #a86f0a, 0 5px 10px rgba(0,0,0,.4);}
  .btn-girar:disabled{opacity:.55;cursor:default;}

  .aviso{margin-top:10px;font-size:.85rem;opacity:.7;text-align:center;padding:0 20px;}

  /* Modal do resultado */
  .modal{
    position:fixed;inset:0;
    background:rgba(10,15,35,.82);
    display:flex;align-items:center;justify-content:center;
    padding:24px;
    z-index:50;
    opacity:0;pointer-events:none;
    transition:opacity .3s;
  }
  .modal.aberto{opacity:1;pointer-events:auto;}
  .cartao{
    background:var(--creme);
    color:var(--marrom);
    border-radius:20px;
    padding:30px 24px 26px;
    max-width:340px;width:100%;
    text-align:center;
    border:5px dashed var(--vermelho);
    box-shadow:0 18px 44px rgba(0,0,0,.55);
    transform:scale(.7);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .modal.aberto .cartao{transform:scale(1);}
  .cartao .rotulo{
    font-size:.8rem;text-transform:uppercase;letter-spacing:3px;
    color:var(--vermelho);font-weight:bold;
  }
  .cartao .prenda{
    font-size:clamp(1.3rem,6vw,1.7rem);
    font-weight:bold;
    margin:14px 0 20px;
    line-height:1.25;
  }
  .cartao button{
    font-family:inherit;
    font-size:1rem;font-weight:bold;
    text-transform:uppercase;letter-spacing:1px;
    color:#fff;background:var(--verde);
    border:none;border-radius:40px;
    padding:12px 34px;cursor:pointer;
    box-shadow:0 4px 0 #2b7549;
    touch-action:manipulation;
  }
  .cartao button:active{transform:translateY(3px);box-shadow:0 1px 0 #2b7549;}

  /* Confete simples */
  .confete{position:fixed;top:-12px;border-radius:2px;z-index:60;pointer-events:none;animation:cair linear forwards;}
  @keyframes cair{to{transform:translateY(110vh) rotate(720deg);opacity:.9;}}

  @media (prefers-reduced-motion: reduce){
    #roda{transition:transform 1.2s ease-out;}
    .confete{display:none;}
  }
</style>
</head>
<body>

<div class="bandeirinhas" aria-hidden="true">
  <svg viewBox="0 0 520 44" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="4" x2="520" y2="4" stroke="#c9a24b" stroke-width="3"/>
    <g>
      <polygon points="10,4 50,4 30,40" fill="#e8484f"/>
      <polygon points="62,4 102,4 82,40" fill="#ffc93c"/>
      <polygon points="114,4 154,4 134,40" fill="#3fa66a"/>
      <polygon points="166,4 206,4 186,40" fill="#7a5fb5"/>
      <polygon points="218,4 258,4 238,40" fill="#ff8c42"/>
      <polygon points="270,4 310,4 290,40" fill="#e86fa4"/>
      <polygon points="322,4 362,4 342,40" fill="#e8484f"/>
      <polygon points="374,4 414,4 394,40" fill="#ffc93c"/>
      <polygon points="426,4 466,4 446,40" fill="#3fa66a"/>
      <polygon points="478,4 518,4 498,40" fill="#ff8c42"/>
    </g>
  </svg>
</div>

<header>
  <h1>Roleta de Prendas</h1>
  <div class="sub">Gire a roleta e cumpra sua prenda!</div>
</header>

<div class="palco">
  <div class="ponteiro">
    <svg width="46" height="52" viewBox="0 0 46 52" xmlns="http://www.w3.org/2000/svg">
      <polygon points="23,52 2,6 44,6" fill="#e8484f" stroke="#fff6e3" stroke-width="3"/>
      <circle cx="23" cy="10" r="6" fill="#ffc93c" stroke="#fff6e3" stroke-width="2"/>
    </svg>
  </div>
  <div class="roda-wrap">
    <svg id="roda" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="cubo-central">BOA<br>SORTE!</div>
</div>

<button class="btn-girar" id="btnGirar">Girar</button>
<div class="aviso">Toque em GIRAR e aguarde a roleta parar.</div>

<div class="modal" id="modal">
  <div class="cartao">
    <div class="rotulo">Sua prenda é</div>
    <div class="prenda" id="textoPrenda"></div>
    <button id="btnFechar">Girar de novo</button>
  </div>
</div>

<script>
(function(){
  const prendas = [
    "Pix de 1 centavo",
    "Pimenta",
    "Monoselha ou Bigode",
    "Tirar uma foto com o Bogo",
    "Correio elegante para um desconhecido (nós escolhemos)",
    "Bebida misteriosa"
  ];
  // Rótulos curtos para caber na roda
  const rotulos = [
    ["Pix de", "1 centavo"],
    ["Pimenta"],
    ["Monoselha", "ou Bigode"],
    ["Foto com", "o Bogo"],
    ["Correio", "elegante"],
    ["Bebida", "misteriosa"]
  ];
  const cores = ["#e8484f","#ffc93c","#3fa66a","#7a5fb5","#ff8c42","#e86fa4"];
  const corTexto = ["#fff6e3","#5a3825","#fff6e3","#fff6e3","#5a3825","#fff6e3"];

  const N = prendas.length;
  const fatia = 360 / N;
  const svg = document.getElementById("roda");
  const NS = "http://www.w3.org/2000/svg";
  const cx = 200, cy = 200, r = 196;

  function polar(ang, raio){
    const rad = (ang - 90) * Math.PI / 180;
    return [cx + raio * Math.cos(rad), cy + raio * Math.sin(rad)];
  }

  for(let i = 0; i < N; i++){
    const a0 = i * fatia, a1 = (i + 1) * fatia;
    const [x0, y0] = polar(a0, r);
    const [x1, y1] = polar(a1, r);
    const path = document.createElementNS(NS, "path");
    path.setAttribute("d", `M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 0 1 ${x1} ${y1} Z`);
    path.setAttribute("fill", cores[i]);
    path.setAttribute("stroke", "#fff6e3");
    path.setAttribute("stroke-width", "3");
    svg.appendChild(path);

    // Texto da fatia
    const meio = a0 + fatia / 2;
    const linhas = rotulos[i];
    linhas.forEach((linha, j) => {
      const t = document.createElementNS(NS, "text");
      const raioTexto = 128;
      const [tx, ty] = polar(meio, raioTexto);
      const desloc = (j - (linhas.length - 1) / 2) * 22;
      t.setAttribute("x", tx);
      t.setAttribute("y", ty + desloc);
      t.setAttribute("fill", corTexto[i]);
      t.setAttribute("font-size", "19");
      t.setAttribute("font-weight", "bold");
      t.setAttribute("font-family", "Trebuchet MS, sans-serif");
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("dominant-baseline", "middle");
      t.setAttribute("transform", `rotate(${meio} ${tx} ${ty})`);
      t.textContent = linha;
      svg.appendChild(t);
    });
  }

  const btn = document.getElementById("btnGirar");
  const modal = document.getElementById("modal");
  const textoPrenda = document.getElementById("textoPrenda");
  const btnFechar = document.getElementById("btnFechar");
  let anguloAtual = 0;
  let girando = false;

  function girar(){
    if(girando) return;
    girando = true;
    btn.disabled = true;

    const sorteio = Math.floor(Math.random() * N);
    // Ângulo do centro da fatia sorteada
    const centroFatia = sorteio * fatia + fatia / 2;
    // Pequena variação para não parar sempre no centro exato
    const jitter = (Math.random() - 0.5) * (fatia * 0.6);
    // Queremos que o centro da fatia fique no topo (ponteiro): rotação = -centroFatia
    const voltas = 5 + Math.floor(Math.random() * 3); // 5 a 7 voltas
    const destino = voltas * 360 + (360 - centroFatia) + jitter;
    anguloAtual += destino - (anguloAtual % 360);

    svg.style.transform = `rotate(${anguloAtual}deg)`;

    const dur = matchMedia("(prefers-reduced-motion: reduce)").matches ? 1300 : 5400;
    setTimeout(() => {
      textoPrenda.textContent = prendas[sorteio];
      modal.classList.add("aberto");
      soltarConfete();
      girando = false;
    }, dur);
  }

  function fechar(){
    modal.classList.remove("aberto");
    btn.disabled = false;
  }

  function soltarConfete(){
    if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    const cs = ["#e8484f","#ffc93c","#3fa66a","#7a5fb5","#ff8c42","#e86fa4","#fff6e3"];
    for(let i = 0; i < 60; i++){
      const c = document.createElement("div");
      c.className = "confete";
      const tam = 6 + Math.random() * 8;
      c.style.width = tam + "px";
      c.style.height = tam * (0.6 + Math.random()) + "px";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = cs[Math.floor(Math.random() * cs.length)];
      c.style.animationDuration = (2.2 + Math.random() * 2.2) + "s";
      c.style.animationDelay = (Math.random() * 0.5) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5200);
    }
  }

  btn.addEventListener("click", girar);
  btnFechar.addEventListener("click", fechar);
})();
</script>
</body>
</html>
